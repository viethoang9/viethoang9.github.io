<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Workflow</title>
<meta name="description" content="Workflow — a personal automation tool for publishing short-form video to platforms you manage.">
<style>
  :root {
    --fg: #1f2328;
    --muted: #57606a;
    --bg: #ffffff;
    --card: #f6f8fa;
    --border: #d0d7de;
    --accent: #0969da;
    --link: #0969da;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --fg: #e6edf3;
      --muted: #9198a1;
      --bg: #0d1117;
      --card: #161b22;
      --border: #30363d;
      --accent: #58a6ff;
      --link: #58a6ff;
    }
  }
  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font: 16px/1.65 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji", sans-serif;
    padding: 2rem 1rem 4rem;
    min-height: 100vh;
  }
  .wrap {
    max-width: 720px;
    margin: 0 auto;
  }
  header {
    border-bottom: 1px solid var(--border);
    padding-bottom: 1.5rem;
    margin-bottom: 2rem;
  }
  h1 {
    font-size: 2.1rem;
    margin: 0 0 .5rem;
    line-height: 1.2;
  }
  .tagline {
    color: var(--muted);
    font-size: 1.05rem;
    margin: 0;
  }
  .links {
    list-style: none;
    margin: 1.5rem 0;
    padding: 0;
  }
  .links li {
    margin: .5rem 0;
  }
  .links a {
    display: block;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: .85rem 1.1rem;
    color: var(--fg);
    font-size: 1rem;
    transition: border-color .15s, transform .05s;
  }
  .links a:hover {
    border-color: var(--accent);
    text-decoration: none;
  }
  .links a:active { transform: translateY(1px); }
  .links a small {
    display: block;
    color: var(--muted);
    font-size: .85rem;
    margin-top: .15rem;
  }
  .contact {
    margin-top: 2.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid var(--border);
    color: var(--muted);
    font-size: .92rem;
  }
  .contact a { color: var(--link); text-decoration: none; }
  .contact a:hover { text-decoration: underline; }
  footer {
    margin-top: 3rem;
    color: var(--muted);
    font-size: .85rem;
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <h1>Workflow</h1>
    <p class="tagline">A personal automation tool for publishing short-form video to platforms you manage.</p>
  </header>

  <ul class="links">
    <li>
      <a href="/privacy.html">
        Privacy Policy
        <small>How Workflow handles information and third-party API access.</small>
      </a>
    </li>
    <li>
      <a href="/terms.html">
        Terms of Service
        <small>The terms under which Workflow is provided and used.</small>
      </a>
    </li>
  </ul>

  <div class="contact">
    Contact: <a href="mailto:bigzero43@gmail.com">bigzero43@gmail.com</a>
  </div>

  <footer>
    &copy; 2026 Workflow.
  </footer>

</div>
</body>
</html>
